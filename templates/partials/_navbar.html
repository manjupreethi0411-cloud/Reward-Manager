<header class="navbar" role="banner">

  <!-- Hamburger (mobile) -->
  <button class="navbar-hamburger" id="sidebarToggle" aria-label="Open navigation" aria-expanded="false">
    <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Breadcrumb / page title -->
  <div class="navbar-breadcrumb">
    <span class="page-title">{{ page_title|default:"Dashboard" }}</span>
  </div>

  <!-- Actions -->
  <div class="navbar-actions">

    <!-- Quick add reward -->
    <a href="{% url 'frontend:reward_add' %}" class="navbar-icon-btn" title="Add Reward" aria-label="Add new reward" id="navbar-add-btn">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
    </a>

    <!-- Expiring soon bell -->
    <a href="{% url 'frontend:rewards_expiring' %}" class="navbar-icon-btn" title="Expiring Soon" aria-label="View expiring rewards" id="navbar-expiring-btn">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      <span class="notif-badge"></span>
    </a>

    <!-- User menu -->
    <div class="navbar-user" id="userMenuBtn" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false">
      <div class="user-avatar" aria-hidden="true">
        {{ request.user.first_name|first|upper }}{{ request.user.last_name|first|upper }}
      </div>
      <div>
        <div class="user-name">{{ request.user.get_full_name|default:request.user.email }}</div>
        <div class="user-email">{{ request.user.email }}</div>
      </div>
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
      </svg>

      <!-- Dropdown -->
      <div class="user-dropdown" role="menu">
        <a href="{% url 'frontend:profile' %}" class="dropdown-item" role="menuitem" id="dropdown-profile">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          My Profile
        </a>
        <a href="{% url 'frontend:dashboard' %}" class="dropdown-item" role="menuitem" id="dropdown-dashboard">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Dashboard
        </a>
        <div class="dropdown-divider"></div>
        <form method="post" action="{% url 'frontend:logout' %}" style="margin:0">
          {% csrf_token %}
          <button type="submit" class="dropdown-item danger w-full" role="menuitem" id="dropdown-logout"
                  style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit;width:100%;text-align:left;">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h5a2 2 0 012 2v1"/>
            </svg>
            Sign Out
          </button>
        </form>
      </div>
    </div><!-- /.navbar-user -->

  </div><!-- /.navbar-actions -->

</header>
